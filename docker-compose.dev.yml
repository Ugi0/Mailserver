services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: mailserver-frontend-dev
    ports:
      - "80:5173"
    volumes:
      - ./frontend:/app
      - /frontend/node_modules
    environment:
      - NODE_ENV=development
    restart: on-failure
  
  database:
    image: postgres:16
    container_name: mailserver-db
    env_file:
      - backend/db.env
    volumes:
      - mailserver-db-data:/var/lib/postgresql/data
      - ./backend/db-init.sql:/docker-entrypoint-initdb.d/db-init.sql:ro
    restart: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: mailserver-backend-dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - backend/.env
    restart: on-failure

  sieve-helper:
    build:
      context: ./sieve-helper
      dockerfile: Dockerfile
    container_name: mailserver-sieve-helper
    env_file:
      - ./sieve-helper/.env
    restart: on-failure

volumes:
  mailserver-db-data: